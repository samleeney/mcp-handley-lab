display_categories:
  - name: "Llama 4 Models (Preview)"
    tags: ["llama4"]
    description: "Meta's latest Llama 4 multimodal model with vision support."
  - name: "Llama 3.x Models (Production)"
    tags: ["llama"]
    exclude_tags: ["llama4", "safety"]
    description: "Meta's production-ready Llama 3.x generation models."
  - name: "🛡️ Safety Models"
    tags: ["safety", "moderation"]
    description: "Prompt injection detection and content moderation models."
  - name: "OpenAI GPT-OSS Models"
    tags: ["gpt-oss"]
    description: "OpenAI's open-weight GPT models."
  - name: "Moonshot Kimi Models"
    tags: ["kimi"]
    description: "Moonshot AI's long-context reasoning models."
  - name: "Qwen Models"
    tags: ["qwen"]
    description: "Alibaba's Qwen multilingual models."
  - name: "🎤 Text-to-Speech"
    tags: ["tts"]
    description: "Speech synthesis models (output handling not fully implemented)."
  - name: "🎧 Speech Recognition"
    tags: ["asr", "whisper"]
    description: "Automatic speech recognition models (input handling not fully implemented)."

default_model: "openai/gpt-oss-120b"

usage_notes:
  - "Groq models are served via an OpenAI-compatible API."
  - "All LLM models support the 'temperature' parameter."
  - "Pricing is per million tokens (input/output) for LLMs."
  - "Llama 4 Scout (17B/16E) and Maverick (17B/128E) support vision/multimodal inputs."
  - "Context windows: Most models support 131K tokens, Kimi supports 262K tokens."
  - "Preview models may be deprecated with short notice."
  - "TTS models: Orpheus English ($22/M chars), Orpheus Arabic ($40/M chars)"
  - "ASR models: Whisper v3 ($0.111/hr), Whisper Turbo ($0.04/hr) - billed min 10s"
  - "⚠️ Audio I/O handling not fully implemented - models listed for completeness"
