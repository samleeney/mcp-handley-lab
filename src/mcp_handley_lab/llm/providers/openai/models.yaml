    tags: ["flagship", "latest", "general", "premium", "vision"]
    context_window: "1,050,000 tokens"
    output_tokens: 128000
    param: "max_output_tokens"
    supports_temperature: false  # Only supported when reasoning.effort = none
    supports_vision: true
    supports_reasoning: true  # Supports none (default), low, medium, high, xhigh
    supports_verbosity: true  # Supports low, medium (default), high

    # Pricing (tiered: <272K and >272K context)
    input_tiers:
      - threshold: 272000
        price: 2.50
      - threshold: .inf
        price: 5.00
    output_tiers:
