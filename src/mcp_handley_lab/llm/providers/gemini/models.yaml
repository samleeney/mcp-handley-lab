models:
  gemini-3.1-pro-preview:
    # Model metadata
    description: "Most intelligent Gemini model with advanced reasoning and precise tool usage"
    capabilities: "🌟 Best for: Complex problem-solving, agentic workflows, multi-step execution, precise tool usage"
    tags: ["gemini-3.1", "pro", "latest", "multimodal", "reasoning"]
    context_window: "1,000,000 tokens"
    output_tokens: 65536

    # Capabilities
    supports_vision: true
    supports_grounding: true
    supports_thinking_level: true
    supports_media_resolution: true
    supports_thought_signatures: true

    # Pricing (tiered based on token count) - same as 3 Pro for now
    input_tiers:
      - threshold: 200000
        price: 2.00
      - threshold: .inf
        price: 4.00
    output_tiers:
      - threshold: 200000
        price: 12.00
      - threshold: .inf
        price: 18.00

  gemini-3.1-pro-preview-customtools:
    # Model metadata
    description: "Gemini 3.1 Pro optimized for custom tools and bash execution"
    capabilities: "🛠️ Best for: Custom tool usage, bash execution, agentic coding"
    tags: ["gemini-3.1", "pro", "tools", "multimodal"]
    context_window: "1,000,000 tokens"
    output_tokens: 65536

    # Capabilities
    supports_vision: true
    supports_grounding: true
    supports_thinking_level: true
    supports_media_resolution: true
    supports_thought_signatures: true

    # Pricing (same as 3.1 Pro)
    input_tiers:
      - threshold: 200000
        price: 2.00
      - threshold: .inf
        price: 4.00
    output_tiers:
      - threshold: 200000
        price: 12.00
      - threshold: .inf
        price: 18.00

  gemini-3.1-flash-lite-preview:
    # Model metadata
    description: "Cost-effective Gemini 3.1 Flash Lite model for fast, high-volume tasks"
    capabilities: "⚡ Best for: High-volume tasks, cost-sensitive applications, fast inference"
    tags: ["gemini-3.1", "flash", "cost-effective", "fast"]
    context_window: "1,000,000 tokens"
    output_tokens: 65536

    # Capabilities
    supports_vision: true
    supports_grounding: true

    # Pricing
    input_per_1m: 0.25
    output_per_1m: 1.50

  gemini-3-pro-preview:
    # Model metadata
    description: "DEPRECATED (shutdown 2026-03-09) - Previous generation reasoning model"
    capabilities: "🌟 Best for: Agentic workflows, autonomous coding, complex multimodal tasks, advanced reasoning"
    tags: ["gemini-3", "pro", "multimodal", "reasoning", "deprecated"]
    context_window: "1,000,000 tokens"
    output_tokens: 64000

    # Capabilities
    supports_vision: true
    supports_grounding: true
    supports_thinking_level: true
    supports_media_resolution: true
    supports_thought_signatures: true

    # Pricing (tiered based on token count)
    input_tiers:
      - threshold: 200000
        price: 2.00
      - threshold: .inf
        price: 4.00
    output_tiers:
      - threshold: 200000
        price: 12.00
      - threshold: .inf
        price: 18.00

  gemini-3-flash-preview:
    # Model metadata
    description: "Fast, efficient Gemini 3 model balancing speed and intelligence"
    capabilities: "⚡ Best for: Fast inference, general tasks, cost-effective multimodal"
    tags: ["gemini-3", "flash", "fast", "multimodal"]
    context_window: "1,000,000 tokens"
    output_tokens: 64000

    # Capabilities
    supports_vision: true
    supports_grounding: true
    supports_thinking_level: true

    # Pricing (by modality)
    input_by_modality:
      text: 0.50
      image: 0.50
      video: 0.50
      audio: 1.00
    output_per_1m: 3.00

  gemini-3-pro-image-preview:
    # Model metadata
    description: "Gemini 3 Pro with native multimodal image generation capabilities"
    capabilities: "🎨 Best for: Native image generation, multimodal creation, text-to-image"
    tags: ["gemini-3", "pro", "image-generation", "multimodal"]
    context_window: "1,000,000 tokens"
    output_tokens: 64000

    # Capabilities
    supports_vision: true
    supports_grounding: true
    supports_thinking_level: true
    supports_image_generation: true

    # Pricing (tiered for text, per-image for generated images)
    input_tiers:
      - threshold: 200000
        price: 2.00
      - threshold: .inf
        price: 4.00
    output_tiers:
      - threshold: 200000
        price: 12.00
      - threshold: .inf
        price: 18.00
    # Image generation: $0.134-$0.24 per image (~$120/1M output tokens)
    image_output_per_1m: 120.00

  gemini-2.5-pro:
    # Model metadata
    description: "Powerful reasoning model excelling at coding and complex reasoning tasks"
    capabilities: "🎯 Best for: Complex reasoning, analysis, multimodal tasks, long documents"
    tags: ["gemini-2.5", "pro", "multimodal"]
    context_window: "2,000,000 tokens"
    output_tokens: 65536

    # Capabilities
    supports_vision: true
    supports_grounding: true

    # Pricing (tiered based on token count)
    input_tiers:
      - threshold: 200000
        price: 1.25
      - threshold: .inf
        price: 2.50
    output_tiers:
      - threshold: 200000
        price: 10.00
      - threshold: .inf
        price: 15.00
    free_tier: true

  gemini-2.5-flash:
    # Model metadata
    description: "Fast, efficient model balancing speed and intelligence"
    capabilities: "⚖️ Best for: Most general tasks, balanced performance and speed"
    tags: ["gemini-2.5", "flash", "general", "multimodal"]
    context_window: "1,000,000 tokens"
    output_tokens: 65536

    # Capabilities
    supports_vision: true
    supports_grounding: true

    # Pricing (by modality)
    input_by_modality:
      text: 0.30
      image: 0.30
      video: 0.30
      audio: 1.00
    output_per_1m: 2.50
    free_tier: true

  gemini-2.5-flash-lite:
    # Model metadata
    description: "Fastest, most cost-effective model for simple tasks"
    capabilities: "⚡ Best for: Simple queries, high-volume tasks, cost-sensitive applications"
    tags: ["gemini-2.5", "flash", "cost-effective", "fast"]
    context_window: "1,000,000 tokens"
    output_tokens: 64000

    # Capabilities
    supports_vision: true
    supports_grounding: true

    # Pricing (by modality)
    input_by_modality:
      text: 0.10
      image: 0.10
      video: 0.10
      audio: 0.30
    output_per_1m: 0.40
    free_tier: true

  # Native image generation models (Nano Banana family)
  gemini-3.1-flash-image-preview:
    # Model metadata
    description: "Nano Banana 2 - high-efficiency image generation at Flash speed"
    capabilities: "🎨 Best for: High-volume image generation, fast iteration, text rendering"
    tags: ["gemini-3.1", "flash", "image-generation", "multimodal"]
    context_window: "1,000,000 tokens"
    output_tokens: 65536

    # Capabilities
    supports_vision: true
    supports_grounding: false
    supports_image_generation: true

    # Pricing (token-based, resolution-dependent)
    input_by_modality:
      text: 0.50
      image: 0.50
    output_per_1m: 60.00
    # ~$0.045/image at 512px, ~$0.067/image at 1K, ~$0.101/image at 2K, ~$0.151/image at 4K

  gemini-2.5-flash-image:
    # Model metadata
    description: "Nano Banana - native image generation and editing with Flash efficiency"
    capabilities: "🎨 Best for: Image generation, image editing, cost-effective creative tasks"
    tags: ["gemini-2.5", "flash", "image-generation", "multimodal"]
    context_window: "1,000,000 tokens"
    output_tokens: 65536

    # Capabilities
    supports_vision: true
    supports_grounding: false
    supports_image_generation: true

    # Pricing (token-based)
    input_by_modality:
      text: 0.30
      image: 0.30
    output_per_1m: 60.00

  # Imagen models
  imagen-4.0-generate-001:
    # Model metadata
    description: "High-quality image generation (standard quality)"
    capabilities: "🎨 Best for: Standard quality image generation"
    tags: ["image-generation", "latest"]
    context_window: "N/A (Image generation)"

    # Capabilities
    supports_vision: false
    supports_grounding: false

    # Pricing (per image)
    price_per_image: 0.040
    pricing_type: "per_image"
    quality: "standard"

  imagen-4.0-fast-generate-001:
    # Model metadata
    description: "Fast image generation"
    capabilities: "⚡ Best for: Quick image generation"
    tags: ["image-generation", "latest", "fast"]
    context_window: "N/A (Image generation)"

    # Capabilities
    supports_vision: false
    supports_grounding: false

    # Pricing (per image)
    price_per_image: 0.020
    pricing_type: "per_image"
    quality: "fast"

  imagen-4.0-ultra-generate-001:
    # Model metadata
    description: "Ultra-high quality image generation"
    capabilities: "🎨 Best for: Ultra-high quality artistic images"
    tags: ["image-generation", "latest", "premium"]
    context_window: "N/A (Image generation)"

    # Capabilities
    supports_vision: false
    supports_grounding: false

    # Pricing (per image)
    price_per_image: 0.060
    pricing_type: "per_image"
    quality: "ultra"

  imagen-4.0-generate-preview-06-06:
    # Model metadata
    description: "Preview version of Imagen 4 (standard quality)"
    capabilities: "🎨 Best for: Testing Imagen 4 features (preview)"
    tags: ["image-generation", "preview"]
    context_window: "N/A (Image generation)"

    # Capabilities
    supports_vision: false
    supports_grounding: false

    # Pricing (per image) - same as standard Imagen 4
    price_per_image: 0.040
    pricing_type: "per_image"
    quality: "standard"

  # Video generation models
  veo-3.1-generate-preview:
    # Model metadata
    description: "State-of-the-art video generation with native audio (8s, up to 4K)"
    capabilities: "🎬 Best for: Cinematic video creation, native audio, high-fidelity video"
    tags: ["video-generation", "latest"]
    context_window: "N/A (Video generation)"

    # Capabilities
    supports_vision: false
    supports_grounding: false

    # Pricing (per second)
    price_per_second: 0.75
    pricing_type: "per_second"

  veo-2.0-generate-001:
    # Model metadata
    description: "Previous generation video model"
    capabilities: "🎬 Best for: Cost-effective video generation"
    tags: ["video-generation", "legacy"]
    context_window: "N/A (Video generation)"

    # Capabilities
    supports_vision: false
    supports_grounding: false

    # Pricing (per second)
    price_per_second: 0.35
    pricing_type: "per_second"

  # Deep research agents
  gemini-deep-research:
    # Model metadata
    description: "Deep research agent - autonomous web research and synthesis"
    capabilities: "🔬 Best for: Complex research questions, literature reviews, market analysis"
    tags: ["research", "agent", "latest"]
    best_for: "Complex research questions, literature reviews, market analysis"
    context_window: "Unlimited (web)"
    output_tokens: 100000

    # Agent configuration
    is_agent: true

    # Pricing (per request, ~$2-5 per task)
    pricing_type: "per_request"
    price_per_request: 3.00

# Display categories (how to group models by tags for presentation)
display_categories:
  - name: "🌟 Gemini 3.1 Series"
    tags: ["gemini-3.1"]
    description: "Latest generation with advanced reasoning and precise tool usage (recommended)"
  - name: "⭐ Gemini 3 Series"
    tags: ["gemini-3"]
    description: "Previous generation with strong reasoning and multimodal capabilities"
  - name: "🚀 Gemini 2.5 Series"
    tags: ["gemini-2.5"]
    description: "Powerful generation with free tiers available"
  - name: "🎨 Native Image Generation (Nano Banana)"
    tags: ["image-generation", "multimodal"]
    description: "Native multimodal image generation models (Nano Banana family)"
  - name: "🎨 Imagen Models"
    tags: ["image-generation"]
    exclude_tags: ["multimodal"]
    description: "Dedicated image generation models (Imagen 4)"
  - name: "🎬 Video Generation"
    tags: ["video-generation"]
    description: "Video content creation models"
  - name: "🔬 Research Agents"
    tags: ["research"]
    description: "Autonomous deep research agents for complex investigations"

# Default model
default_model: "gemini-3.1-pro-preview"

# Usage notes
usage_notes:
  - "Gemini 3.1 Pro Preview is the recommended default for best performance"
  - "Gemini 3.1 Pro supports thinking_level (low/medium/high) for controlling reasoning depth"
  - "Gemini 3.1 Pro supports media_resolution for multimodal vision control"
  - "Gemini 3.1 Pro uses thought signatures for maintaining reasoning context"
  - "Gemini 3.1 Pro Preview has a customtools variant optimized for tool use and bash"
  - "Gemini 3 Flash Preview offers fast inference with Gemini 3 capabilities"
  - "Gemini 3 Pro Image Preview supports native multimodal image generation"
  - "All Gemini 3+ models have 1M token context window"
  - "Gemini 3+ models default to temperature 1.0 (strongly recommended per documentation)"
  - "Gemini 2.5 Pro, Flash, and Flash-Lite have free tiers available"
  - "Pro models have large context windows (1M-2M tokens)"
  - "Flash models balance speed and capability with lower costs"
  - "All text models support multimodal input (text, images, video)"
  - "Audio input has higher costs than text/image/video for Flash models"
  - "Tiered pricing applies to Pro models based on token count thresholds"
  - "Google Search grounding: 1,500 RPD free, then additional charges apply"
  - "Gemini 3.1 Flash Lite Preview: Cost-effective model ($0.25/$1.50 per 1M tokens)"
  - "Gemini 3 Pro Preview: DEPRECATED as of 2026-03-09, use Gemini 3.1 Pro instead"
  - "Nano Banana 2 (gemini-3.1-flash-image-preview): Fast image gen ~$0.045-$0.15/image depending on resolution"
  - "Nano Banana (gemini-2.5-flash-image): Native image generation and editing"
  - "Imagen 4 models charge per image ($0.02-$0.06)"
  - "Veo 3.1: State-of-the-art video generation with native audio ($0.75/sec)"
  - "Veo 2.0: Previous generation video ($0.35/sec)"
