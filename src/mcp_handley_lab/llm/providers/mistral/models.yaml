models:
  # === FRONTIER GENERALIST MODELS ===
  mistral-large-latest:
    description: "Latest flagship model - Mistral Large 3 (v25.12)"
    capabilities: "🎯 Best for: Complex reasoning, analysis, multimodal tasks"
    tags: ["mistral-large", "latest", "frontier", "multimodal"]
    context_window: "256,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    input_per_1m: 0.50
    output_per_1m: 1.50

  mistral-medium-latest:
    description: "Mistral Medium 3.5 - hybrid frontier model unifying instruct, reasoning, coding and vision (v26.04)"
    capabilities: "🎯 Best for: Complex tasks, reasoning, coding, balanced cost/performance"
    tags: ["mistral-medium", "latest", "frontier", "multimodal", "reasoning"]
    context_window: "256,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    supports_reasoning: true
    input_per_1m: 1.50
    output_per_1m: 7.50

  mistral-small-latest:
    description: "Mistral Small 4 - hybrid efficient model with reasoning and vision (v26.03, floating tag)"
    capabilities: "⚡ Best for: Everyday tasks, reasoning, cost-effective"
    tags: ["mistral-small", "latest", "cost-effective", "reasoning"]
    context_window: "256,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    supports_reasoning: true
    input_per_1m: 0.10
    output_per_1m: 0.30

  mistral-small-4-0-26-03:
    description: "Mistral Small 4 - hybrid efficient model with reasoning and vision (v26.03, snapshot)"
    capabilities: "⚡ Best for: Everyday tasks, reasoning, cost-effective"
    tags: ["mistral-small", "snapshot", "reasoning"]
    context_window: "256,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    supports_reasoning: true
    input_per_1m: 0.10
    output_per_1m: 0.30

  # === MINISTRAL EDGE MODELS ===
  ministral-3b-latest:
    description: "Ministral 3 3B - tiny efficient model with vision (v25.12)"
    capabilities: "🚀 Best for: Edge deployment, ultra-low latency"
    tags: ["ministral", "edge", "cost-effective", "vision"]
    context_window: "256,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    input_per_1m: 0.10
    output_per_1m: 0.10

  ministral-8b-latest:
    description: "Ministral 3 8B - efficient model with vision (v25.12)"
    capabilities: "🚀 Best for: Fast inference, high-volume tasks"
    tags: ["ministral", "edge", "cost-effective", "vision"]
    context_window: "256,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    input_per_1m: 0.15
    output_per_1m: 0.15

  ministral-14b-latest:
    description: "Ministral 3 14B - mid-size efficient model with vision (v25.12)"
    capabilities: "🚀 Best for: Balanced edge performance, moderate complexity"
    tags: ["ministral", "edge", "cost-effective", "vision"]
    context_window: "256,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    input_per_1m: 0.20
    output_per_1m: 0.20

  # === CODING MODELS ===
  codestral-latest:
    description: "Codestral - cutting-edge coding model (v25.08)"
    capabilities: "💻 Best for: Code generation, completion, debugging"
    tags: ["codestral", "coding", "latest"]
    context_window: "128,000 tokens"
    output_tokens: 8192
    supports_vision: false
    supports_grounding: false
    supports_fim: true
    input_per_1m: 0.30
    output_per_1m: 0.90

  # === AUDIO MODELS (VOXTRAL) ===
  voxtral-small-latest:
    description: "Voxtral Small - audio chat model (v25.07)"
    capabilities: "🎤 Best for: Audio conversations, voice understanding"
    tags: ["voxtral", "audio", "chat"]
    context_window: "32,000 tokens"
    output_tokens: 8192
    supports_vision: false
    supports_grounding: false
    supports_audio: true
    input_per_1m: 0.10
    output_per_1m: 0.30

  voxtral-mini-latest:
    description: "Voxtral Mini - audio transcription model (v25.07)"
    capabilities: "🎤 Best for: Speech-to-text, transcription"
    tags: ["voxtral", "audio", "transcription"]
    context_window: "32,000 tokens"
    output_tokens: 8192
    supports_vision: false
    supports_grounding: false
    supports_audio: true
    supports_transcription: true
    input_per_1m: 0.04
    output_per_1m: 0.04

  voxtral-mini-transcribe-26-02:
    description: "Voxtral Mini Transcribe - latest audio transcription (Feb 2026)"
    capabilities: "🎤 Best for: High-accuracy speech-to-text, transcription"
    tags: ["voxtral", "audio", "transcription", "latest"]
    context_window: "32,000 tokens"
    output_tokens: 8192
    supports_vision: false
    supports_grounding: false
    supports_audio: true
    supports_transcription: true
    input_per_1m: 0.04
    output_per_1m: 0.04

  voxtral-mini-transcribe-realtime-26-02:
    description: "Voxtral Mini Transcribe Realtime - live transcription (Feb 2026)"
    capabilities: "🎤 Best for: Real-time transcription, live audio processing"
    tags: ["voxtral", "audio", "transcription", "realtime", "latest"]
    context_window: "32,000 tokens"
    output_tokens: 8192
    supports_vision: false
    supports_grounding: false
    supports_audio: true
    supports_transcription: true
    input_per_1m: 0.04
    output_per_1m: 0.04

  voxtral-tts-latest:
    description: "Voxtral TTS - text-to-speech with voice cloning (v26.03)"
    capabilities: "🎤 Best for: Speech synthesis, voice cloning"
    tags: ["voxtral", "audio", "tts", "latest"]
    context_window: "N/A (TTS)"
    output_tokens: 0
    supports_vision: false
    supports_grounding: false
    supports_audio: true
    # Pricing: $0.016 per 1,000 characters
    price_per_1m_chars: 16.00
    pricing_type: "per_character"

  # === SPECIALIST MODELS ===
  ocr-3-25-12:
    description: "OCR 3 - latest document text extraction model (Dec 2025)"
    capabilities: "📄 Best for: OCR, document parsing, PDF extraction"
    tags: ["ocr", "document-ai", "latest"]
    context_window: "N/A (document processing)"
    output_tokens: 0
    supports_vision: true
    supports_grounding: false
    # Pricing: $2 per 1,000 pages
    input_per_1m: 2.00
    output_per_1m: 0.00

  mistral-ocr-latest:
    description: "Dedicated OCR model for document text extraction (alias)"
    capabilities: "📄 Best for: OCR, document parsing, PDF extraction"
    tags: ["ocr", "document-ai"]
    context_window: "N/A (document processing)"
    output_tokens: 0
    supports_vision: true
    supports_grounding: false
    # Pricing: $2 per 1,000 pages
    input_per_1m: 2.00
    output_per_1m: 0.00

  mistral-moderation-latest:
    description: "Content moderation model (v26.03, floating tag)"
    capabilities: "🛡️ Best for: Content safety, harmful text detection"
    tags: ["moderation", "safety", "latest"]
    context_window: "8,000 tokens"
    output_tokens: 0
    supports_vision: false
    supports_grounding: false
    input_per_1m: 0.10
    output_per_1m: 0.00

  mistral-moderation-26-03:
    description: "Content moderation model (v26.03, snapshot)"
    capabilities: "🛡️ Best for: Content safety, harmful text detection"
    tags: ["moderation", "safety", "snapshot"]
    context_window: "8,000 tokens"
    output_tokens: 0
    supports_vision: false
    supports_grounding: false
    input_per_1m: 0.10
    output_per_1m: 0.00

  # === EMBEDDING MODELS ===
  mistral-embed:
    description: "Text embedding model for semantic search"
    capabilities: "🔍 Best for: RAG, semantic search, clustering"
    tags: ["embedding", "text"]
    context_window: "8,000 tokens"
    output_tokens: 0
    supports_vision: false
    supports_grounding: false
    embedding_dimensions: 1024
    input_per_1m: 0.10
    output_per_1m: 0.00

  codestral-embed:
    description: "Code embedding model (v25.05)"
    capabilities: "🔍 Best for: Code search, repository exploration"
    tags: ["embedding", "code"]
    context_window: "8,000 tokens"
    output_tokens: 0
    supports_vision: false
    supports_grounding: false
    embedding_dimensions: 1024
    input_per_1m: 0.15
    output_per_1m: 0.00

# Display categories (how to group models by tags for presentation)
display_categories:
  - name: "🎯 Frontier Generalist"
    tags: ["frontier"]
    description: "Most capable models for complex tasks"
  - name: "⚡ Efficient Generalist"
    tags: ["mistral-small"]
    description: "Efficient hybrid models with reasoning and vision"
  - name: "💻 Coding Models"
    tags: ["codestral", "coding"]
    description: "Specialized for code generation and SWE"
  - name: "🎤 Audio Models"
    tags: ["voxtral", "audio"]
    description: "Speech-to-text and audio chat"
  - name: "🚀 Edge Models"
    tags: ["ministral", "edge"]
    description: "Efficient models for high-volume tasks"
  - name: "📄 Document AI"
    tags: ["ocr", "document-ai"]
    description: "OCR and document processing"
  - name: "🔍 Embeddings"
    tags: ["embedding"]
    description: "Vector embeddings for search and RAG"
  - name: "🛡️ Safety"
    tags: ["moderation", "safety"]
    description: "Content moderation and safety"

# Default model
default_model: "mistral-large-latest"

# Usage notes
usage_notes:
  - "Mistral Large 3 (v25.12): Flagship with vision ($0.50/$1.50 per 1M tokens)"
  - "Mistral Medium 3.5 (v26.04): Hybrid frontier model with reasoning and vision ($1.50/$7.50 per 1M tokens)"
  - "Mistral Small 4 (v26.03): Hybrid efficient model with reasoning and vision ($0.10/$0.30 per 1M tokens)"
  - "Medium 3.5 / Small 4 unify instruct, reasoning, coding and vision — use prompt_mode='reasoning' for step-by-step thinking"
  - "Magistral (reasoning), Devstral (coding) and Pixtral (vision) families are deprecated; capabilities folded into Medium 3.5 / Small 4"
  - "Codestral: Supports FIM (fill-in-middle) for code completion"
  - "Voxtral: Audio input for chat and transcription; voxtral-tts ($0.016/1k chars) for text-to-speech with voice cloning"
  - "Ministral: Edge-optimized models (3B, 8B, 14B) for high-volume tasks"
  - "OCR 3 (ocr-3-25-12): Latest document OCR, $2 per 1,000 pages"
  - "Voxtral Transcribe (26-02): Latest transcription models including realtime"
  - "Context windows: Large/Medium/Small/Ministral 256k, Codestral 128k, Voxtral 32k"
  - "Free tier available for experimentation"
