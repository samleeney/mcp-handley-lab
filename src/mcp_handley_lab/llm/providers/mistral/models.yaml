models:
  # === FRONTIER GENERALIST MODELS ===
  mistral-large-latest:
    description: "Latest flagship model - Mistral Large 3 (v25.12)"
    capabilities: "🎯 Best for: Complex reasoning, analysis, multimodal tasks"
    tags: ["mistral-large", "latest", "frontier", "multimodal"]
    context_window: "256,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    input_per_1m: 0.50
    output_per_1m: 1.50

  mistral-medium-latest:
    description: "Mistral Medium 3.1 - frontier multimodal model (v25.08)"
    capabilities: "🎯 Best for: Complex tasks, balanced cost/performance"
    tags: ["mistral-medium", "latest", "frontier", "multimodal"]
    context_window: "128,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    input_per_1m: 0.40
    output_per_1m: 2.00

  mistral-small-latest:
    description: "Mistral Small 3.2 - efficient general model (v25.06)"
    capabilities: "⚡ Best for: Everyday tasks, cost-effective"
    tags: ["mistral-small", "latest", "cost-effective"]
    context_window: "128,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    input_per_1m: 0.10
    output_per_1m: 0.30

  # === MINISTRAL EDGE MODELS ===
  ministral-3b-latest:
    description: "Ministral 3 3B - tiny efficient model with vision (v25.12)"
    capabilities: "🚀 Best for: Edge deployment, ultra-low latency"
    tags: ["ministral", "edge", "cost-effective", "vision"]
    context_window: "256,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    input_per_1m: 0.10
    output_per_1m: 0.10

  ministral-8b-latest:
    description: "Ministral 3 8B - efficient model with vision (v25.12)"
    capabilities: "🚀 Best for: Fast inference, high-volume tasks"
    tags: ["ministral", "edge", "cost-effective", "vision"]
    context_window: "256,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    input_per_1m: 0.15
    output_per_1m: 0.15

  ministral-14b-latest:
    description: "Ministral 3 14B - mid-size efficient model with vision (v25.12)"
    capabilities: "🚀 Best for: Balanced edge performance, moderate complexity"
    tags: ["ministral", "edge", "cost-effective", "vision"]
    context_window: "256,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    input_per_1m: 0.20
    output_per_1m: 0.20

  # === REASONING MODELS (MAGISTRAL) ===
  magistral-medium-latest:
    description: "Magistral Medium 1.2 - frontier reasoning model (v25.09)"
    capabilities: "🧠 Best for: Complex reasoning, step-by-step thinking"
    tags: ["magistral", "reasoning", "frontier"]
    context_window: "128,000 tokens"
    output_tokens: 40000
    supports_vision: false
    supports_grounding: false
    supports_reasoning: true
    input_per_1m: 2.00
    output_per_1m: 5.00

  magistral-small-latest:
    description: "Magistral Small 1.2 - efficient reasoning model (v25.09)"
    capabilities: "🧠 Best for: Cost-effective reasoning tasks"
    tags: ["magistral", "reasoning", "cost-effective"]
    context_window: "128,000 tokens"
    output_tokens: 40000
    supports_vision: false
    supports_grounding: false
    supports_reasoning: true
    input_per_1m: 0.50
    output_per_1m: 1.50

  # === CODING MODELS ===
  codestral-latest:
    description: "Codestral - cutting-edge coding model (v25.08)"
    capabilities: "💻 Best for: Code generation, completion, debugging"
    tags: ["codestral", "coding", "latest"]
    context_window: "128,000 tokens"
    output_tokens: 8192
    supports_vision: false
    supports_grounding: false
    supports_fim: true
    input_per_1m: 0.30
    output_per_1m: 0.90

  devstral-medium-latest:
    description: "Devstral 2 Medium - advanced open SWE model (v25.12)"
    capabilities: "💻 Best for: Complex software engineering, agentic coding"
    tags: ["devstral", "coding", "swe"]
    context_window: "256,000 tokens"
    output_tokens: 8192
    supports_vision: false
    supports_grounding: false
    supports_fim: true
    input_per_1m: 0.40
    output_per_1m: 2.00

  devstral-small-latest:
    description: "Devstral Small 2 - efficient open SWE model (v25.12)"
    capabilities: "💻 Best for: Software engineering tasks, cost-effective"
    tags: ["devstral", "coding", "swe"]
    context_window: "256,000 tokens"
    output_tokens: 8192
    supports_vision: false
    supports_grounding: false
    supports_fim: true
    input_per_1m: 0.10
    output_per_1m: 0.30

  # === VISION MODELS (PIXTRAL) ===
  pixtral-large-latest:
    description: "Pixtral Large - multimodal vision model (v24.11)"
    capabilities: "👁️ Best for: Image analysis, multimodal tasks"
    tags: ["pixtral", "vision", "multimodal"]
    context_window: "128,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    input_per_1m: 2.00
    output_per_1m: 6.00

  pixtral-12b-2409:
    description: "DEPRECATED (retired Dec 31, 2025) - Pixtral 12B lightweight vision model"
    capabilities: "👁️ Best for: OCR, cost-effective vision tasks (use ministral-14b-latest instead)"
    tags: ["pixtral", "vision", "cost-effective", "deprecated"]
    context_window: "128,000 tokens"
    output_tokens: 8192
    supports_vision: true
    supports_grounding: false
    input_per_1m: 0.15
    output_per_1m: 0.15

  # === AUDIO MODELS (VOXTRAL) ===
  voxtral-small-latest:
    description: "Voxtral Small - audio chat model (v25.07)"
    capabilities: "🎤 Best for: Audio conversations, voice understanding"
    tags: ["voxtral", "audio", "chat"]
    context_window: "32,000 tokens"
    output_tokens: 8192
    supports_vision: false
    supports_grounding: false
    supports_audio: true
    input_per_1m: 0.10
    output_per_1m: 0.30

  voxtral-mini-latest:
    description: "Voxtral Mini - audio transcription model (v25.07)"
    capabilities: "🎤 Best for: Speech-to-text, transcription"
    tags: ["voxtral", "audio", "transcription"]
    context_window: "32,000 tokens"
    output_tokens: 8192
    supports_vision: false
    supports_grounding: false
    supports_audio: true
    supports_transcription: true
    input_per_1m: 0.04
    output_per_1m: 0.04

  voxtral-mini-transcribe-26-02:
    description: "Voxtral Mini Transcribe - latest audio transcription (Feb 2026)"
    capabilities: "🎤 Best for: High-accuracy speech-to-text, transcription"
    tags: ["voxtral", "audio", "transcription", "latest"]
    context_window: "32,000 tokens"
    output_tokens: 8192
    supports_vision: false
    supports_grounding: false
    supports_audio: true
    supports_transcription: true
    input_per_1m: 0.04
    output_per_1m: 0.04

  voxtral-mini-transcribe-realtime-26-02:
    description: "Voxtral Mini Transcribe Realtime - live transcription (Feb 2026)"
    capabilities: "🎤 Best for: Real-time transcription, live audio processing"
    tags: ["voxtral", "audio", "transcription", "realtime", "latest"]
    context_window: "32,000 tokens"
    output_tokens: 8192
    supports_vision: false
    supports_grounding: false
    supports_audio: true
    supports_transcription: true
    input_per_1m: 0.04
    output_per_1m: 0.04

  # === SPECIALIST MODELS ===
  ocr-3-25-12:
    description: "OCR 3 - latest document text extraction model (Dec 2025)"
    capabilities: "📄 Best for: OCR, document parsing, PDF extraction"
    tags: ["ocr", "document-ai", "latest"]
    context_window: "N/A (document processing)"
    output_tokens: 0
    supports_vision: true
    supports_grounding: false
    # Pricing: $2 per 1,000 pages
    input_per_1m: 2.00
    output_per_1m: 0.00

  mistral-ocr-latest:
    description: "Dedicated OCR model for document text extraction (alias)"
    capabilities: "📄 Best for: OCR, document parsing, PDF extraction"
    tags: ["ocr", "document-ai"]
    context_window: "N/A (document processing)"
    output_tokens: 0
    supports_vision: true
    supports_grounding: false
    # Pricing: $2 per 1,000 pages
    input_per_1m: 2.00
    output_per_1m: 0.00

  mistral-moderation-latest:
    description: "Content moderation model (v24.11)"
    capabilities: "🛡️ Best for: Content safety, harmful text detection"
    tags: ["moderation", "safety"]
    context_window: "8,000 tokens"
    output_tokens: 0
    supports_vision: false
    supports_grounding: false
    input_per_1m: 0.10
    output_per_1m: 0.00

  # === EMBEDDING MODELS ===
  mistral-embed:
    description: "Text embedding model for semantic search"
    capabilities: "🔍 Best for: RAG, semantic search, clustering"
    tags: ["embedding", "text"]
    context_window: "8,000 tokens"
    output_tokens: 0
    supports_vision: false
    supports_grounding: false
    embedding_dimensions: 1024
    input_per_1m: 0.10
    output_per_1m: 0.00

  codestral-embed:
    description: "Code embedding model (v25.05)"
    capabilities: "🔍 Best for: Code search, repository exploration"
    tags: ["embedding", "code"]
    context_window: "8,000 tokens"
    output_tokens: 0
    supports_vision: false
    supports_grounding: false
    embedding_dimensions: 1024
    input_per_1m: 0.15
    output_per_1m: 0.00

# Display categories (how to group models by tags for presentation)
display_categories:
  - name: "🎯 Frontier Generalist"
    tags: ["frontier"]
    description: "Most capable models for complex tasks"
  - name: "🧠 Reasoning Models"
    tags: ["magistral", "reasoning"]
    description: "Step-by-step thinking and complex reasoning"
  - name: "💻 Coding Models"
    tags: ["codestral", "devstral", "coding"]
    description: "Specialized for code generation and SWE"
  - name: "👁️ Vision Models"
    tags: ["pixtral", "vision"]
    description: "Multimodal image understanding"
  - name: "🎤 Audio Models"
    tags: ["voxtral", "audio"]
    description: "Speech-to-text and audio chat"
  - name: "🚀 Edge Models"
    tags: ["ministral", "edge"]
    description: "Efficient models for high-volume tasks"
  - name: "📄 Document AI"
    tags: ["ocr", "document-ai"]
    description: "OCR and document processing"
  - name: "🔍 Embeddings"
    tags: ["embedding"]
    description: "Vector embeddings for search and RAG"
  - name: "🛡️ Safety"
    tags: ["moderation", "safety"]
    description: "Content moderation and safety"

# Default model
default_model: "mistral-large-latest"

# Usage notes
usage_notes:
  - "Mistral Large 3 (v25.12): Latest flagship with vision ($0.50/$1.50 per 1M tokens)"
  - "Devstral 2 Medium ($0.40/$2.00), Devstral Small 2 ($0.10/$0.30) for agentic coding"
  - "Magistral models: Use prompt_mode='reasoning' for step-by-step thinking"
  - "Codestral: Supports FIM (fill-in-middle) for code completion"
  - "Voxtral: Audio input for chat and transcription"
  - "Ministral: Edge-optimized models (3B, 8B, 14B) for high-volume tasks"
  - "OCR 3 (ocr-3-25-12): Latest document OCR, $2 per 1,000 pages"
  - "Voxtral Transcribe (26-02): Latest transcription models including realtime"
  - "Context windows: Large/Ministral/Devstral/Magistral 256k, Codestral/Mistral-Medium/Small 128k, Voxtral 32k"
  - "Free tier available for experimentation"
